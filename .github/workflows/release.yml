name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: crux-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: crux-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: crux-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: crux-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build CruxBar (macOS only)
        if: runner.os == 'macOS'
        run: |
          cd crux-bar
          swift build -c release --arch arm64 --arch x86_64

      - name: Create CruxBar.app bundle (macOS only)
        if: runner.os == 'macOS'
        run: |
          mkdir -p CruxBar.app/Contents/MacOS
          cp crux-bar/.build/apple/Products/Release/CruxBar CruxBar.app/Contents/MacOS/
          cat > CruxBar.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>CruxBar</string>
            <key>CFBundleIdentifier</key>
            <string>com.amaljithk.CruxBar</string>
            <key>CFBundleName</key>
            <string>CruxBar</string>
            <key>CFBundleVersion</key>
            <string>0.5.0</string>
            <key>CFBundleShortVersionString</key>
            <string>0.5.0</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Package
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            tar czf ${{ matrix.name }}.tar.gz -C target/${{ matrix.target }}/release crux -C ../../../ CruxBar.app
          else
            cd target/${{ matrix.target }}/release
            tar czf ../../../${{ matrix.name }}.tar.gz crux
            cd ../../..
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.gz

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
